name: Lint kotlin codes using ktlint

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: "Ktlint version. If empty, workflow tries to get version from gradle/libs.versions.toml#ktlint"
        required: false
        default: ""
      test_repo:
        type: string
        description: "Repository to checkout instead of the caller (used for workflow self-testing)."
        required: false
        default: ""
      test_ref:
        type: string
        description: "Ref of test_repo to checkout (used for workflow self-testing)."
        required: false
        default: ""
    secrets:
      checkout_token:
        description: "Token used for actions/checkout when test_repo points to a private repository. Falls back to the default GITHUB_TOKEN."
        required: false

permissions:
  contents: read

jobs:
  ktlint:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[CI-SKIP]') }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Validate self-test inputs
        env:
          TEST_REPO: ${{ inputs.test_repo }}
          TEST_REF: ${{ inputs.test_ref }}
        run: |
          if [ -n "$TEST_REPO" ] && [ -z "$TEST_REF" ]; then
            echo "::error::test_repo is set but test_ref is empty. They must be specified together."
            exit 1
          fi
          if [ -z "$TEST_REPO" ] && [ -n "$TEST_REF" ]; then
            echo "::error::test_ref is set but test_repo is empty. They must be specified together."
            exit 1
          fi
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ inputs.test_repo || github.repository }}
          ref: ${{ inputs.test_ref || github.ref }}
          token: ${{ secrets.checkout_token || github.token }}
          persist-credentials: false
      - name: Resolve ktlint version
        id: resolve-version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(grep -m1 '^ktlint\s*=\s*"' gradle/libs.versions.toml | sed -e 's/^ktlint\s*=\s*"\(.*\)"/\1/')
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([._-][A-Za-z0-9._-]*)?$'; then
            echo "Invalid ktlint version: $VERSION" >&2
            exit 1
          fi
          echo "Detected version $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Setup reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
      - name: Install ktlint
        env:
          KTLINT_VERSION: ${{ steps.resolve-version.outputs.version }}
        run: |
          curl -fsSLO --retry 3 --retry-all-errors \
            "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint"
          chmod a+x ktlint
          mkdir -p "$RUNNER_TEMP/ktlint-bin"
          mv ktlint "$RUNNER_TEMP/ktlint-bin/"
          echo "$RUNNER_TEMP/ktlint-bin" >> "$GITHUB_PATH"
      - name: Lint Check
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For fork PRs the GITHUB_TOKEN is read-only and cannot post review comments or
          # check-runs, so fall back to the local reporter which simply prints findings.
          REPORTER: >-
            ${{
              (github.event_name == 'pull_request'
                && github.event.pull_request.head.repo.full_name == github.repository
                && 'github-pr-review')
              || (github.event_name == 'pull_request' && 'local')
              || 'github-check'
            }}
        run: |
          ktlint --reporter=checkstyle --log-level=none 2>/dev/null | \
          reviewdog -f=checkstyle \
                    -name="ktlint" \
                    -reporter="${REPORTER}" \
                    -filter-mode=added \
                    -fail-on-error=true
