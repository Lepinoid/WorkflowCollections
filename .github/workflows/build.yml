name: Gradle Package

on:
  workflow_call:
    inputs:
      java_version:
        type: string
        required: false
        default: ""
      gradle_args:
        type: string
        required: false
        default: build --stacktrace
      upload_artifacts:
        type: boolean
        required: false
        default: false
      upload_folder:
        type: string
        required: false
        default: build/libs/

permissions:
  contents: read

jobs:
  java-version:
    if: ${{ !inputs.java_version }}
    uses: Lepinoid/WorkflowCollections/.github/workflows/get-java-ver.yml@f239b3203db2e65d7489f33354cc7bef12972f72
    
  build:
    needs: java-version
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && !failure() && github.repository_owner == 'Lepinoid' && !contains(github.event.head_commit.message, '[CI-SKIP]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up JDK ${{ inputs.java_version || needs.java-version.outputs.java_version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ inputs.java_version || needs.java-version.outputs.java_version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Run ${{ inputs.gradle_args }}
        run: |
          read -ra ARGS <<< "${INPUT_ARGS}"
          ./gradlew "${ARGS[@]}"
        env:
          INPUT_ARGS: ${{ inputs.gradle_args }}

      - name: Upload artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: Artifacts
          path: ${{ inputs.upload_folder }}
